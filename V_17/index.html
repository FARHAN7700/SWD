<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            color: rgb(47, 198, 127);
            background-color: lightgreen;
        }

        #id-selector{
            color: rgb(182, 33, 182);
            
            background-color: aquamarine;
        }

        .class-selector{
            color: rgb(255, 255, 0);
            background-color: lightgray;
        }

        *{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0px;
            padding: 0px;
        }
        div > h1{
            color: rgb(255, 0, 0);
            background-color: lightblue;
        }
        div p{
            color: rgb(0, 0, 255);
            background-color: lightyellow;
        }
        
        

    </style>
</head>
<body>
    <p>element selector</p>
    <p id="id-selector">id selector</p>
    <p class="class-selector">class selector</p>
<div>        <h1>child selector</h1>
    </div>

    <div>
        <h1>
            <p>grandchild selector</p>
        </h1>
    </div>

</body>
</html>
